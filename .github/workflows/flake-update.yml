name: Update flake.lock (auto-merge)

on:
  schedule:
    - cron: "0 15 * * *" # 毎日 0:00 JST
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-flake:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Update flake.lock
        run: nix flake update

      - name: Check flake
        run: nix flake check

      - name: Build package
        run: nix build .#

      - name: Run CLI (version check)
        run: ./result/bin/pomodoro --version

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(nix): update flake.lock"
          title: "chore(nix): update flake.lock"
          body: |
            Automated flake.lock update.
            - nix flake update
            - nix flake check passed
            - build & CLI smoke test passed
          branch: flake-update
          delete-branch: true
          labels: |
            nix
            dependencies
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
